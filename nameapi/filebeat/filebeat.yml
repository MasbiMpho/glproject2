filebeat.inputs:
- type: filestream
  id: nameapi-logs
  enabled: true
  paths:
    - /logs/*.log # Matches the volume mapping from NameAPI

output.logstash:
  # Graylog natively accepts Beats format via the Logstash output
  hosts: ["graylog:5044"]